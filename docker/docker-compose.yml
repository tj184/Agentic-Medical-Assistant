version: "3.9"

services:

  medical-ai-api:

    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: medical_ai_api

    ports:
      - "8000:8000"

    volumes:
      - ..:/app

    env_file:
      - ../.env

    depends_on:
      - postgres
      - redis

  postgres:

    image: postgres:15

    container_name: medical_ai_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: medical_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: medical_ai_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: